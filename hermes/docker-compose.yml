services:
  jarvis-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis-discord-bot
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      ALLOWED_USER_IDS: ${ALLOWED_USER_IDS}
      MNEMO_URL: ${MNEMO_URL:-http://mnemo-cloud:8080}
      MNEMO_USER: ${MNEMO_USER:-mx}
      MNEMO_PASS: ${MNEMO_PASS}
      OPENCODE_SERVER_URL: ${OPENCODE_SERVER_URL:-http://host.docker.internal:4096}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD}
      SESSION_FILE_PATH: ${SESSION_FILE_PATH:-/data/sessions.json}
      METRICS_ADDR: ${METRICS_ADDR:-0.0.0.0:9090}
      DIAGNOSTICS_DIR: ${DIAGNOSTICS_DIR:-/data/diagnostics}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - bot-data:/data
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - postgres_default

volumes:
  bot-data:

networks:
  postgres_default:
    external: true
