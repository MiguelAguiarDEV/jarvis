services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mnemo_cloud
      POSTGRES_USER: mnemo
      POSTGRES_PASSWORD: mnemo_dev
    ports:
      - "5433:5432"
    volumes:
      - mnemo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mnemo -d mnemo_cloud"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mnemo_pg_data:
