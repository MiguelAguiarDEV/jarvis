          schema:
            type: string
            format: date-time
        - name: until
          in: query
          description: RFC3339 date override
          schema:
            type: string
            format: date-time
        - name: claude_budget
          in: query
          description: Monthly Claude budget in USD
          schema:
            type: integer
            default: 200
        - name: openai_budget
          in: query
          description: Monthly OpenAI budget in USD
          schema:
            type: integer
            default: 200
      responses:
        '200':
          description: Cost summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostSummary'

  /api/costs/sessions:
    get:
      tags: [Costs]
