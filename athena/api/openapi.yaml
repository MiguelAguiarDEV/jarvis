  # ===== Notifications =====
  /api/notifications:
    post:
      tags: [Notifications]
      summary: Send a notification
      description: Sends a notification via the configured notifier (e.g. Discord DM).
      operationId: sendNotification
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationRequest'
      responses:
        '200':
          description: Notification sent
          content:
            application/json:
              schema:
                type: object
