      summary: Get budget status with monthly projection
      operationId: getCostBudget
      security:
        - BearerAuth: []
      parameters:
        - name: claude_budget
          in: query
          description: Monthly Claude budget in USD
          schema:
            type: integer
            default: 200
        - name: openai_budget
          in: query
          description: Monthly OpenAI budget in USD
          schema:
            type: integer
            default: 200
      responses:
        '200':
          description: Budget status
          content:
