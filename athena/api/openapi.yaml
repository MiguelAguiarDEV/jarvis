  # ===== Jobs =====
  /api/jobs:
    get:
      tags: [Jobs]
      summary: List all delegation jobs
      operationId: listJobs
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Jobs list
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
        '503':
          description: Jobs service not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [Jobs]
      summary: Create a new async delegation job
      operationId: createJob
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobRequest'
      responses:
        '201':
          description: Job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                  status:
                    type: string
                    example: pending
                  message:
                    type: string
        '400':
          description: Missing task field
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Jobs service not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/jobs/{id}:
    get:
      tags: [Jobs]
      summary: Get a job by ID
      operationId: getJob
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                type: object
                properties:
                  job:
                    type: object
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Jobs service not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ===== Sync =====
  /sync/push:
    post:
      tags: [Sync]
      summary: Push a sync chunk
      description: |
        Receives a sync chunk with sessions, observations, and prompts.
        Idempotent via chunk_id (ON CONFLICT DO NOTHING). Body limit: 50 MB.
      operationId: syncPush
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chunk_id, data]
              properties:
                chunk_id:
                  type: string
                  pattern: '^[0-9a-fA-F]{8}$'
                  example: "a1b2c3d4"
                created_by:
                  type: string
                data:
                  type: object
                  properties:
                    sessions:
                      type: array
                      items:
                        type: object
                    observations:
                      type: array
                      items:
                        type: object
                    prompts:
                      type: array
                      items:
                        type: object
      responses:
        '200':
          description: Chunk accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: accepted
                  chunk_id:
                    type: string
                  sessions_stored:
                    type: integer
                  observations_stored:
                    type: integer
                  prompts_stored:
                    type: integer
        '409':
          description: Project sync paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: Request body too large (max 50MB)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sync/pull:
    get:
      tags: [Sync]
      summary: Get chunk manifest
      operationId: syncPullManifest
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Chunk manifest
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: integer
                    example: 1
                  chunks:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        created_by:
                          type: string
                        created_at:
                          type: string
                        sessions:
                          type: integer
                        memories:
                          type: integer
                        prompts:
                          type: integer

  /sync/pull/{chunk_id}:
    get:
      tags: [Sync]
      summary: Pull a specific chunk by ID
      operationId: syncPullChunk
      security:
        - BearerAuth: []
      parameters:
        - name: chunk_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Raw chunk data
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Chunk not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sync/mutations/push:
    post:
      tags: [Sync]
      summary: Push a batch of mutations
      description: |
        Appends mutations to the cloud ledger. Best-effort materialization
        into relational tables. Body limit: 10 MB.
      operationId: syncMutationsPush
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mutations:
                  type: array
                  items:
                    type: object
                    properties:
                      entity:
                        type: string
                      entity_key:
                        type: string
                      op:
                        type: string
                        enum: [upsert, delete]
                      payload:
                        type: object
      responses:
        '200':
          description: Mutations accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: integer
                  last_seq:
                    type: integer
                    format: int64
        '409':
          description: Project sync paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: Request body too large (max 10MB)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sync/mutations/pull:
    get:
      tags: [Sync]
      summary: Pull mutations since a sequence number
      operationId: syncMutationsPull
      security:
        - BearerAuth: []
      parameters:
        - name: since_seq
          in: query
          schema:
            type: integer
            format: int64
            default: 0
        - name: limit
          in: query
          description: Max mutations to return (max 1000)
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        '200':
          description: Mutations since sequence
          content:
            application/json:
              schema:
                type: object
                properties:
                  mutations:
                    type: array
                    items:
                      type: object
                  has_more:
                    type: boolean

  /sync/search:
    get:
      tags: [Sync]
      summary: Search observations
      operationId: syncSearch
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: project
          in: query
          schema:
            type: string
        - name: scope
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
        '400':
          description: Missing q parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sync/context:
    get:
      tags: [Sync]
      summary: Get formatted context
      operationId: syncContext
      security:
        - BearerAuth: []
      parameters:
        - name: project
          in: query
          schema:
            type: string
        - name: scope
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Formatted context string
          content:
            application/json:
              schema:
                type: object
                properties:
                  context:
                    type: string
